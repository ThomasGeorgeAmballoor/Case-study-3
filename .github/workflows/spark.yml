name: Bank Fraud CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib scikit-learn pyspark jupyter notebook findspark

      - name: Build Docker Image
        run: |
          docker build -t bank_fraud:v1 .